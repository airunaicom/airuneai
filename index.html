<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRUNEAI — The AI that knows before you ask</title>
  <style>
    :root { --gold: #C9A84C; --deep: #0E0B1A; --black: #07070D; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--black); color: white; line-height: 1.6; }
    .hero { min-height: 100vh; background: linear-gradient(135deg, #0E0B1A 0%, #1A1428 100%); display: flex; align-items: center; justify-content: center; text-align: center; position: relative; }
    h1 { font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900; letter-spacing: -0.05em; background: linear-gradient(90deg, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { font-size: 1.6rem; max-width: 720px; margin: 1.5rem auto; }
    .cta { padding: 1.2rem 3rem; font-size: 1.25rem; font-weight: 700; background: var(--gold); color: black; border: none; border-radius: 12px; cursor: pointer; margin: 0.8rem; }
    .cta:hover { transform: scale(1.05); }

    .chat-btn { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: black; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 10px 40px rgba(201,168,76,0.6); cursor: pointer; z-index: 1000; }
    #chat-window { display: none; position: fixed; bottom: 110px; right: 20px; width: 380px; height: 560px; background: #1A1428; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); overflow: hidden; z-index: 1001; flex-direction: column; }
    .chat-header { background: var(--gold); color: black; padding: 1rem; text-align: center; font-weight: bold; }
    .chat-body { flex: 1; overflow-y: auto; padding: 1rem; background: #0E0B1A; display: flex; flex-direction: column; gap: 12px; }
    .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; }
    .user { background: #C9A84C; color: black; align-self: flex-end; }
    .ai { background: #2A233F; align-self: flex-start; }
    .chat-input { display: flex; padding: 1rem; background: #1A1428; gap: 8px; }
    .chat-input input { flex: 1; padding: 14px; border: none; border-radius: 30px; background: #2A233F; color: white; }
  </style>
</head>
<body>

  <section class="hero">
    <div style="max-width:800px; padding:2rem; text-align:center;">
      <h2 style="color:var(--gold); letter-spacing:6px;">ANCIENT INTELLIGENCE • MODERN POWER</h2>
      <h1>AIRUNEAI</h1>
      <p class="tagline">It doesn't just answer.<br><strong>It understands — before you finish asking.</strong></p>
      <button onclick="document.getElementById('early-access').scrollIntoView({behavior:'smooth'})" class="cta">GET EARLY ACCESS</button>
    </div>
  </section>

  <!-- Chat Button -->
  <div class="chat-btn" onclick="toggleChat()">🤖</div>

  <!-- Chat Window -->
  <div id="chat-window">
    <div class="chat-header">AIRUNEAI — Captain Joko's Digital Twin</div>
    <div class="chat-body" id="chat-body">
      <div class="message ai">Hello Captain Joko! I'm your real Grok-powered AiruneAI. How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()" style="background:var(--gold); color:black; border:none; padding:0 24px; border-radius:30px; font-weight:bold;">Send</button>
    </div>
  </div>

  <script>
    const chatBody = document.getElementById('chat-body');

    function toggleChat() {
      const chat = document.getElementById('chat-window');
      chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    }

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatBody.appendChild(msg);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      const typing = addMessage("Thinking as your digital twin...", 'ai');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        typing.remove();
        addMessage(data.reply, 'ai');
      } catch (e) {
        typing.remove();
        addMessage("Connection error. Please try again.", 'ai');
      }
    }
  </script>
</body>
</html>
