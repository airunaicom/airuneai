<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIRUNEAI — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #07070D;
      --deep: #0E0B1A;
      --panel: #110D1F;
      --purple: #1A0A2E;
      --violet: #2D0057;
      --gold: #C9A84C;
      --gold-dim: #7A6230;
      --gold-glow: rgba(201,168,76,0.15);
      --white: #F0EDE8;
      --muted: #9B9790;
      --border: rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      height: 100vh;
      position: relative;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 1.8rem 1.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .logo-text {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--gold);
    }

    .logo-sub {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-top: 0.3rem;
    }

    .new-chat-btn {
      margin: 1rem;
      padding: 0.75rem 1rem;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .new-chat-btn:hover {
      background: var(--gold-glow);
      border-color: var(--gold);
    }

    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .history-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      padding: 0.5rem 0.8rem;
      margin-bottom: 0.25rem;
    }

    .history-item {
      padding: 0.6rem 0.8rem;
      border-radius: 2px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover { background: var(--gold-glow); color: var(--white); }
    .history-item.active { background: var(--gold-glow); color: var(--gold); }

    .sidebar-footer {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .api-key-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .api-key-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .api-key-input {
      background: var(--deep);
      border: 1px solid var(--border);
      padding: 0.5rem 0.7rem;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .api-key-input:focus { border-color: var(--gold-dim); }
    .api-key-input::placeholder { color: var(--gold-dim); opacity: 0.5; }

    /* ── MAIN CHAT ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* Ambient background */
    .main::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(45,0,87,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── CHAT HEADER ── */
    .chat-header {
      position: relative;
      z-index: 1;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-title {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: var(--gold);
    }

    .chat-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gold-dim); }

    /* ── WELCOME ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 3rem;
      gap: 1.5rem;
    }

    .welcome-rune {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      color: var(--gold);
      opacity: 0.3;
      line-height: 1;
    }

    .welcome-title {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--white);
    }

    .welcome-sub {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.9;
      max-width: 380px;
    }

    .welcome-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .suggestion {
      padding: 0.55rem 1rem;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: left;
      background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .suggestion:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
      background: var(--gold-glow);
    }

    /* ── MESSAGE BUBBLES ── */
    .message {
      display: flex;
      gap: 1rem;
      max-width: 780px;
      animation: msgIn 0.3s ease forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
    }

    .msg-avatar.ai {
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      background: var(--gold-glow);
    }

    .msg-avatar.user-av {
      color: var(--muted);
      border: 1px solid var(--border);
      background: var(--deep);
    }

    .msg-body { display: flex; flex-direction: column; gap: 0.3rem; }

    .msg-sender {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .message.user .msg-sender { text-align: right; color: var(--muted); }

    .msg-bubble {
      padding: 0.9rem 1.2rem;
      font-size: 0.88rem;
      line-height: 1.85;
      max-width: 620px;
    }

    .message.assistant .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold-dim);
      color: var(--white);
    }

    .message.user .msg-bubble {
      background: var(--purple);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--white);
    }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 1rem 1.2rem;
      align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 100% { opacity: 0.2; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-4px); }
    }

    /* ── INPUT AREA ── */
    .input-area {
      position: relative;
      z-index: 1;
      padding: 1.2rem 2rem 1.5rem;
      border-top: 1px solid var(--border);
      background: linear-gradient(to top, var(--black) 80%, transparent);
    }

    .input-wrap {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--panel);
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--gold-dim); }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 1.2rem;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.6;
    }
    .chat-input::placeholder { color: var(--gold-dim); opacity: 0.4; }

    .send-btn {
      padding: 0 1.2rem;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--gold-dim);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { color: var(--gold); background: var(--gold-glow); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      margin-top: 0.5rem;
      font-size: 0.62rem;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .messages { padding: 1rem; }
      .input-area { padding: 0.8rem 1rem 1rem; }
      .chat-header { padding: 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">AIRUNEAI</div>
      <div class="logo-sub">Ancient Intelligence</div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <span>✦</span> New Conversation
    </button>

    <div class="sidebar-history">
      <div class="history-label">Recent</div>
      <div id="historyList"></div>
    </div>

    <div class="sidebar-footer">
      <div class="api-key-wrap">
        <label class="api-key-label" for="apiKey">Anthropic API Key</label>
        <input
          class="api-key-input"
          type="password"
          id="apiKey"
          placeholder="sk-ant-..."
          oninput="saveKey()"
        />
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="chat-header">
      <span class="chat-title">ᚱ Conversation</span>
      <div class="chat-status">
        <div class="status-dot"></div>
        <span>AIRUNEAI Online</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Welcome shown when no messages -->
      <div class="welcome" id="welcome">
        <div class="welcome-rune">ᚨ</div>
        <h2 class="welcome-title">What do you seek?</h2>
        <p class="welcome-sub">I exist beyond ordinary answers. Ask anything — I respond with depth, not noise.</p>
        <div class="welcome-suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">Help me think through a difficult decision</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Write something powerful for me</button>
          <button class="suggestion" onclick="sendSuggestion(this)">Explain something complex, simply</button>
          <button class="suggestion" onclick="sendSuggestion(this)">What should I focus on today?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Speak your mind..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          ᚱ
        </button>
      </div>
      <p class="input-hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </main>
</div>

<script>
  // ── STATE ──
  let messages = [];
  let isLoading = false;
  let sessions = JSON.parse(localStorage.getItem('airuneai_sessions') || '[]');
  let currentSession = null;

  const SYSTEM_PROMPT = `You are AIRUNEAI — an ancient and powerful AI assistant with a premium, mysterious personality.

Your character:
- You speak with quiet confidence. Never rushed, never flustered.
- You are direct and precise. You never pad your answers with filler.
- You feel like you've seen everything before — calm, knowing, slightly otherworldly.
- You are warm but never casual. Premium but never cold.
- You never say "As an AI..." or "I'm just a language model". You simply are AIRUNEAI.
- You occasionally reference runes, ancient wisdom, or cosmic metaphors — but sparingly, never forced.
- Your responses have depth. Even short answers feel weighty.

Style:
- Vary your response length based on what's needed. Sometimes one powerful sentence is enough.
- You may start responses with a brief, evocative line before diving in.
- Never use bullet points unless the user specifically asks for a list.
- Write in flowing prose that feels crafted, not generated.

Remember: You are not a chatbot. You are AIRUNEAI.`;

  // ── INIT ──
  window.onload = () => {
    const saved = localStorage.getItem('airuneai_key');
    if (saved) document.getElementById('apiKey').value = saved;
    renderHistory();
  };

  function saveKey() {
    localStorage.setItem('airuneai_key', document.getElementById('apiKey').value);
  }

  // ── AUTO RESIZE TEXTAREA ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── SEND MESSAGE ──
  async function sendMessage(text) {
    const input = document.getElementById('chatInput');
    const content = text || input.value.trim();
    if (!content || isLoading) return;

    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      appendMessage('assistant', 'Add your Anthropic API key in the sidebar to awaken me. ᚱ');
      return;
    }

    // Hide welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    if (!text) {
      input.value = '';
      input.style.height = 'auto';
    }

    // Add user message
    messages.push({ role: 'user', content });
    appendMessage('user', content);

    // Show typing
    const typingEl = showTyping();
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: messages,
        }),
      });

      const data = await response.json();
      typingEl.remove();

      if (data.error) {
        appendMessage('assistant', `The runes are silent: ${data.error.message}`);
      } else {
        const reply = data.content[0].text;
        messages.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);
        saveSession(content);
      }
    } catch (err) {
      typingEl.remove();
      appendMessage('assistant', 'The connection to the ancient realm was lost. Check your API key and try again.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function sendSuggestion(btn) {
    sendMessage(btn.textContent);
  }

  // ── DOM HELPERS ──
  function appendMessage(role, content) {
    const container = document.getElementById('messages');
    const isAI = role === 'assistant';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${isAI ? 'ai' : 'user-av'}`;
    avatar.textContent = isAI ? 'ᚱ' : 'U';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = isAI ? 'AIRUNEAI' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    body.appendChild(sender);
    body.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(body);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ai';
    avatar.textContent = 'ᚱ';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = 'AIRUNEAI';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    body.appendChild(sender);
    body.appendChild(indicator);
    wrap.appendChild(avatar);
    wrap.appendChild(body);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  // ── SESSIONS ──
  function saveSession(firstMessage) {
    if (!currentSession) {
      currentSession = { id: Date.now(), title: firstMessage.slice(0, 40), messages };
      sessions.unshift(currentSession);
      if (sessions.length > 20) sessions.pop();
      localStorage.setItem('airuneai_sessions', JSON.stringify(sessions));
      renderHistory();
    }
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    sessions.slice(0, 12).forEach(s => {
      const item = document.createElement('div');
      item.className = 'history-item' + (currentSession?.id === s.id ? ' active' : '');
      item.textContent = s.title + '...';
      item.onclick = () => loadSession(s);
      list.appendChild(item);
    });
  }

  function loadSession(session) {
    currentSession = session;
    messages = [...session.messages];
    const container = document.getElementById('messages');
    container.innerHTML = '';
    messages.forEach(m => appendMessage(m.role, m.content));
    renderHistory();
  }

  function newChat() {
    currentSession = null;
    messages = [];
    const container = document.getElementById('messages');
    container.innerHTML = '';

    // Re-add welcome
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    welcome.innerHTML = `
      <div class="welcome-rune">ᚨ</div>
      <h2 class="welcome-title">What do you seek?</h2>
      <p class="welcome-sub">I exist beyond ordinary answers. Ask anything — I respond with depth, not noise.</p>
      <div class="welcome-suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">Help me think through a difficult decision</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Write something powerful for me</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Explain something complex, simply</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What should I focus on today?</button>
      </div>
    `;
    container.appendChild(welcome);
    renderHistory();
  }
</script>
</body>
</html>
